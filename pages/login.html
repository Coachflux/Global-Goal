<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In | Global Goal 2026</title>
    <meta name="description" content="Sign in to your Global Goal 2026 account. Earn points, win prizes, and compete on the leaderboard.">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700;800;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
</head>
<body>

    <nav id="navbar">
        <div class="nav-container">
            <a href="../index.html" class="logo">
                <div class="logo-icon">GG</div>
                <span class="logo-text">GLOBAL GOAL</span>
            </a>
            <ul class="nav-links">
                <li><a href="../index.html">Home</a></li>
                <li><a href="earn-points.html">Earn Points</a></li>
                <li><a href="leaderboard.html">Leaderboard</a></li>
                <li><a href="prizes.html">Prizes</a></li>
                <li><a href="highlights.html">Highlights</a></li>
                <li><a href="referral.html">Refer & Earn</a></li>
                <li><a href="signup.html" class="auth-btn"><div class="user-points">Sign Up</div></a></li>
            </ul>
            <button class="mobile-menu-btn" onclick="toggleMobileMenu()">☰</button>
        </div>
    </nav>

    <div class="auth-page">
        <div class="auth-bg"></div>
        <div class="auth-container">
            <div class="auth-card">
                <div class="auth-logo">
                    <div class="logo-icon">GG</div>
                    <h2>Welcome Back</h2>
                    <p>Sign in to continue earning points</p>
                </div>

                <!-- Google Sign In -->
                <button class="google-btn" onclick="handleGoogleSignIn()" id="google-btn">
                    <svg width="20" height="20" viewBox="0 0 24 24">
                        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                    </svg>
                    Continue with Google
                </button>

                <div class="divider">
                    <div class="divider-line"></div>
                    <span class="divider-text">or</span>
                    <div class="divider-line"></div>
                </div>

                <!-- Email Sign In Form -->
                <form class="auth-form" id="login-form" onsubmit="handleEmailSignIn(event)">
                    <div class="form-group">
                        <label class="form-label">Email Address</label>
                        <input type="email" class="form-input" id="login-email" placeholder="you@example.com" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Password</label>
                        <input type="password" class="form-input" id="login-password" placeholder="Enter your password" required>
                    </div>
                    <div class="forgot-link">
                        <a href="#" onclick="handleForgotPassword(event)">Forgot password?</a>
                    </div>
                    <button type="submit" class="btn btn-primary btn-block" id="login-btn">
                        <span class="btn-text">Sign In</span>
                    </button>
                </form>

                <div class="auth-footer">
                    Don't have an account? <a href="signup.html">Sign Up</a>
                </div>
            </div>
        </div>
    </div>

    <script src="../js/main.js"></script>
    <script>
        async function handleGoogleSignIn() {
            const btn = document.getElementById('google-btn');
            btn.classList.add('btn-loading');
            btn.disabled = true;

            const success = await signInWithGoogle();

            if (success) {
                setTimeout(() => {
                    window.location.href = '../index.html';
                }, 1000);
            } else {
                btn.classList.remove('btn-loading');
                btn.disabled = false;
            }
        }

        async function handleEmailSignIn(e) {
            e.preventDefault();

            const email = document.getElementById('login-email').value.trim();
            const password = document.getElementById('login-password').value;
            const btn = document.getElementById('login-btn');

            btn.classList.add('btn-loading');
            btn.disabled = true;

            const success = await signInWithEmail(email, password);

            if (success) {
                setTimeout(() => {
                    window.location.href = '../index.html';
                }, 1000);
            } else {
                btn.classList.remove('btn-loading');
                btn.disabled = false;
            }
        }

        async function handleForgotPassword(e) {
            e.preventDefault();
            const email = document.getElementById('login-email').value.trim();

            if (!email || !email.includes('@')) {
                showNotification('Enter Email', 'Please enter your email address first.', 'error');
                return;
            }

            await resetPassword(email);
        }
    </script>
</body>
</html>
